name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build-portable:
    permissions:
      contents: read

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: install frontend dependencies
        run: npm ci

      - name: read version
        id: version
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=xiaoai-control-pc-v$version-windows-x64-portable.zip" >> $env:GITHUB_OUTPUT

      - name: build portable package
        run: npm run tauri:portable

      - name: rename portable zip
        shell: powershell
        run: |
          Move-Item `
            -Path "build\portable\xiaoai-control-pc-portable.zip" `
            -Destination "build\portable\${{ steps.version.outputs.zip_name }}" `
            -Force

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: build/portable/${{ steps.version.outputs.zip_name }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-portable
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XiaoAi Control PC ${{ github.ref_name }}
          body: 下载绿色版压缩包，解压后直接运行。
          draft: false
          prerelease: false
          files: release-assets/**/*.zip
