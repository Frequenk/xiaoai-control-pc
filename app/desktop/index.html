<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XiaoAi Control PC</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1>XiaoAi Control PC</h1>
          <p class="lead">
            创建开机自启的 Windows 服务, 监听巴法云转发的小爱同学命令
          </p>
          <div class="hero-meta">
            <div class="hero-links">
              <button id="open-repo" type="button" class="repo-button">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path
                    d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
                    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                    -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                    .07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                    -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.52 7.52 0 0 1 4 0c1.53-1.04
                    2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87
                    3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38
                    A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                  />
                </svg>
                <span>GitHub 仓库</span>
              </button>
              <button id="open-releases" type="button" class="primary" hidden>
                下载新版本
              </button>
            </div>
            <div class="app-meta">
              <span class="badge" id="app-version">版本读取中</span>
              <span class="badge" id="update-status">检查更新中</span>
            </div>
          </div>
        </div>
        <div class="hero-card">
          <div class="hero-card-head">
            <span class="hero-label">巴法云请创建窗帘设备类型，映射如下</span>
            <button id="open-help" type="button">详细说明</button>
          </div>
          <ul>
            <li>关闭窗帘 -> 关机</li>
            <li>打开窗帘 -> 重启</li>
            <li>暂停窗帘 -> 注销</li>
          </ul>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">配置</p>
              <h2>巴法云</h2>
            </div>
            <span class="badge" id="config-badge">待填写</span>
          </div>

          <p class="hint hint-top">
            请先在巴法云创建设备类型为窗帘的 MQTT 设备，再填写这里的 Private Key 和 Topic。
          </p>

          <label class="field">
            <span>Private Key</span>
            <input id="bemfa-uid" autocomplete="off" placeholder="请输入巴法云私钥" />
          </label>

          <label class="field">
            <span>Topic</span>
            <input id="bemfa-topic" autocomplete="off" placeholder="请输入 Topic" />
          </label>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">服务</p>
              <h2>Windows 服务</h2>
            </div>
            <span class="badge" id="service-status">检查中</span>
          </div>

          <dl class="meta">
            <div>
              <dt>服务名称</dt>
              <dd id="service-name"></dd>
            </div>
            <div>
              <dt>安装目录</dt>
              <dd id="install-dir"></dd>
            </div>
          </dl>

          <div class="actions">
            <button id="install-service" class="primary">安装或更新服务</button>
            <button id="uninstall-service" class="danger">卸载服务</button>
            <button id="refresh-status">刷新状态</button>
          </div>

          <div class="progress-wrap" id="service-progress-wrap" hidden aria-hidden="true">
            <div class="progress-head">
              <span id="service-progress-value">0%</span>
            </div>
            <div class="progress-track" id="service-progress">
              <div class="progress-bar" id="service-progress-bar"></div>
            </div>
          </div>
          <p class="inline-status" id="inline-status">准备就绪</p>
        </article>
      </section>
    </main>

    <section class="help-modal" id="help-modal" hidden>
      <div class="help-dialog">
        <div class="help-toolbar">
          <div>
            <p class="panel-kicker">说明文档</p>
            <h2>README</h2>
          </div>
          <div class="actions compact-actions">
            <button id="open-help-repo" type="button">GitHub 仓库</button>
            <button id="open-help-releases" type="button">发布页</button>
            <button id="close-help" type="button" class="primary">关闭</button>
          </div>
        </div>
        <iframe
          id="help-frame"
          title="README 详细说明"
          src="./help/index.html"
          loading="lazy"
        ></iframe>
      </div>
    </section>
  </body>
</html>
